name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q

  pet:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      # Release config deliberately — release CI's Swift is stricter than
      # local debug builds and that difference has bitten before (PR #7).
      - name: Build pet (release)
        run: swift build -c release
        working-directory: pet
      - name: Test pet
        run: swift test
        working-directory: pet
